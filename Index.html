<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaillotMania - Maillots de Football</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

header {
  background: #0a0a0a;
  color: white;
  text-align: center;
  padding: 20px;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

.banner {
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
  url('https://images.unsplash.com/photo-1508098682722-e99c643e7f0b');
  background-size: cover;
  color: white;
  text-align: center;
  padding: 70px 20px;
}

.banner h2 {
  margin: 0;
  font-size: 30px;
}

.products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.card {
  background: white;
  width: 220px;
  margin: 15px;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: #111;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  width: 100%;
}

button:hover {
  background: #333;
}

footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  <h1>MaillotMania ⚽</h1>
  <p>Les maillots les plus stylés du moment</p>
</header>

<div class="banner">
  <h2>NOUVELLE COLLECTION 🔥</h2>
  <p>-50% aujourd’hui seulement</p>
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Maillot France 2026</h3>
    <p>24,99€</p>
    <button>Acheter</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Maillot PSG Edition</h3>
    <p>24,99€</p>
    <button>Acheter</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Maillot Barça 2026</h3>
    <p>24,99€</p>
    <button>Acheter</button>
  </div>

</div>

<footer>
  <p>© 2026 MaillotMania - Tous droits réservés</p>
</footer>

</body>
</html>
